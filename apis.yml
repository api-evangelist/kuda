aid: kuda
name: Kuda
description: >-
  Kuda is a Nigerian digital-first retail bank — branded "the money app for
  Africans" and "the bank of the free" — founded in 2019 by Babs Ogundeyi
  and Musty Mustapha and headquartered in Lagos, Nigeria with operations in
  the United Kingdom. Kuda's Nigerian entity, Kuda Microfinance Bank, holds
  a national microfinance bank license from the Central Bank of Nigeria
  (CBN), and Kuda EMI Limited operates as an FCA-authorised electronic
  money institution in the UK. Kuda offers retail banking accounts with
  zero or low fees, debit cards, instant transfers, bill payments, savings
  ("Spend+Save"), investments, overdrafts, and personal loans through its
  iOS, Android, and web apps, plus a Business banking suite covering
  expense accounts and cards, payroll, invoicing, softPOS and physical POS
  terminals, business loans, and CAC business registration. Kuda also
  exposes an Open API ("Kuda Open API") aimed at fintechs, marketplaces,
  and businesses that want to embed Nigerian banking primitives —
  virtual accounts, name enquiry, intra- and inter-bank transfers,
  balance inquiry, transaction history, bill payments, and disbursements
  — directly into their own products, with sandbox and live environments,
  RSA-encrypted request payloads, and client libraries for Node.js, PHP,
  C#, Rust, and Kotlin hosted under the kudabank GitHub organization.
